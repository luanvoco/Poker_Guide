// ============ RANKS / HAND NOTATION ============

const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const rIdx = (r) => RANKS.indexOf(r);
const rankVal = (r) => 14 - rIdx(r);

function expandToken(tok) {
  if (/^([2-9TJQKA])\1$/.test(tok)) return [tok];
  if (/^([2-9TJQKA])\1\+$/.test(tok)) {
    const i = rIdx(tok[0]); const out = [];
    for (let j = i; j >= 0; j--) out.push(RANKS[j] + RANKS[j]);
    return out;
  }
  if (/^([2-9TJQKA])([2-9TJQKA])([so])$/.test(tok)) return [tok];
  if (/^([2-9TJQKA])([2-9TJQKA])([so])\+$/.test(tok)) {
    const m = tok.match(/^([2-9TJQKA])([2-9TJQKA])([so])\+$/);
    const hi = m[1], lo = m[2], suit = m[3];
    const hiI = rIdx(hi), loI = rIdx(lo);
    const out = [];
    for (let j = loI; j > hiI; j--) out.push(hi + RANKS[j] + suit);
    return out;
  }
  return [tok];
}
const expand = (arr) => arr.flatMap(expandToken);

function handAt(row, col) {
  if (row === col) return RANKS[row] + RANKS[col];
  if (col > row) return RANKS[row] + RANKS[col] + 's';
  return RANKS[col] + RANKS[row] + 'o';
}

function cardsToHand(c1, c2) {
  if (!c1 || !c2) return null;
  const [hi, lo] = rankVal(c1.rank) >= rankVal(c2.rank) ? [c1, c2] : [c2, c1];
  if (hi.rank === lo.rank) return hi.rank + lo.rank;
  return hi.rank + lo.rank + (hi.suit === lo.suit ? 's' : 'o');
}

const CHARTS = {};

    };
  }
}

function getAction(pos, sit, hand) {
  const c = CHARTS[pos][sit];
  if (c.raise.has(hand)) return 'RAISE';
  if (c.call.has(hand)) return 'CALL';
  return 'FOLD';
}

function getSizing(pos, sit, action) {
  if (action !== 'RAISE') return '';
  switch (sit) {

// ============ CARDS ============

const SUITS = ['s','h','d','c'];
const SUIT_SYMBOL = { s: '♠', h: '♥', d: '♦', c: '♣' };
const SUIT_COLOR  = { s: 'text-zinc-100', h: 'text-rose-400', d: 'text-sky-400', c: 'text-emerald-400' };

// ============ HAND CLASSIFIER (works for flop, turn, river) ============

function detectTexture(board) {
  const bSuits = board.map(c => c.suit);
  const bRanks = board.map(c => c.rank);
  const bVals = bRanks.map(rankVal);

  const sCount = {};
  bSuits.forEach(s => sCount[s] = (sCount[s] || 0) + 1);
  const rCount = {};
  bRanks.forEach(r => rCount[r] = (rCount[r] || 0) + 1);

  const maxSuit = Math.max(...Object.values(sCount));
  const isPaired = Object.values(rCount).some(c => c >= 2);
  const isMonotone = maxSuit === board.length;
  // Flushy if "many" same suit relative to board size (2/3 on flop, 3/4 on turn, 4/5 on river)
  const flushy = maxSuit >= board.length - 1;

  const sortedVals = [...new Set(bVals)].sort((a, b) => b - a);
  let isConnected = false;
  if (sortedVals.length >= 3) {
    for (let i = 0; i <= sortedVals.length - 3; i++) {
      if (sortedVals[i] - sortedVals[i + 2] <= 4) { isConnected = true; break; }
    }
  }

  if (isPaired) return 'paired';
  if (isMonotone) return 'monotone';
  if (flushy && isConnected) return 'wet';
  if (flushy || isConnected) return 'semiwet';
  return 'dry';
}

function classifyHand(hole, board, stage) {
  const all = [...hole, ...board];
  const ranks = all.map(c => c.rank);
  const suits = all.map(c => c.suit);
  const holeRanks = hole.map(c => c.rank);
  const boardRanks = board.map(c => c.rank);

  const rankCounts = {};
  ranks.forEach(r => rankCounts[r] = (rankCounts[r] || 0) + 1);
  const suitCounts = {};
  suits.forEach(s => suitCounts[s] = (suitCounts[s] || 0) + 1);

  const sortedCounts = Object.entries(rankCounts)
    .sort((a, b) => b[1] - a[1] || rankVal(b[0]) - rankVal(a[0]));
  const topCount = sortedCounts[0][1];
  const secondCount = sortedCounts[1]?.[1] || 0;

  const isFlush = Object.values(suitCounts).some(c => c >= 5);

  const vals = [...new Set(ranks.map(rankVal))].sort((a, b) => a - b);
  if (vals.includes(14)) vals.unshift(1);
  let isStraight = false;
  for (let i = 0; i <= vals.length - 5; i++) {
    if (vals[i + 4] - vals[i] === 4) { isStraight = true; break; }
  }

  let made, madeDetail = '';
  if (isStraight && isFlush) made = 'STRAIGHT_FLUSH';
  else if (topCount === 4) made = 'QUADS';
  else if (topCount === 3 && secondCount === 2) made = 'FULL_HOUSE';
  else if (isFlush) made = 'FLUSH';
  else if (isStraight) made = 'STRAIGHT';
  else if (topCount === 3) made = 'TRIPS_OR_SET';
  else if (topCount === 2 && secondCount === 2) made = 'TWO_PAIR';
  else if (topCount === 2) made = 'PAIR';
  else made = 'HIGH_CARD';

  if (made === 'TRIPS_OR_SET') {
    const tripRank = sortedCounts[0][0];
    madeDetail = holeRanks.filter(r => r === tripRank).length === 2 ? 'Set' : 'Trips';
  }

  if (made === 'TWO_PAIR') {
    const pairs = sortedCounts.filter(([, c]) => c === 2).map(([r]) => r);
    const topBoardVal = Math.max(...boardRanks.map(rankVal));
    const usesTopBoard = pairs.some(p => rankVal(p) === topBoardVal);
    madeDetail = usesTopBoard ? 'Two pair (top)' : 'Two pair';
  }

  if (made === 'PAIR') {
    const pairRank = sortedCounts[0][0];
    const pairV = rankVal(pairRank);
    const boardVals = boardRanks.map(rankVal).sort((a, b) => b - a);
    const isPocket = holeRanks[0] === holeRanks[1];

    if (isPocket && pairRank === holeRanks[0]) {
      if (pairV > boardVals[0]) madeDetail = 'Overpair';
      else if (pairV > boardVals[1]) madeDetail = 'Pocket vào giữa';
      else madeDetail = 'Pocket thấp';
    } else {
      if (pairV === boardVals[0]) {
        const kicker = holeRanks.find(r => r !== pairRank);
        const kV = kicker ? rankVal(kicker) : 0;
        if (kV >= 13) madeDetail = 'Top pair top kicker';
        else if (kV >= 11) madeDetail = 'Top pair kicker tốt';
        else madeDetail = 'Top pair kicker yếu';
      } else if (pairV === boardVals[1]) madeDetail = 'Second pair';
      else madeDetail = 'Bottom pair';
    }
  }

  // Draws (suppress on river)
  const isRiver = stage === 'river';
  const hasFlushDraw = !isFlush && !isRiver && Object.values(suitCounts).some(c => c === 4);
  let drawType = null;
  if (!isStraight && !isRiver) {
    const v = [...new Set(ranks.map(rankVal))].sort((a, b) => a - b);
    if (v.includes(14)) v.unshift(1);
    let oesd = false, gutshot = false;
    for (let i = 0; i <= v.length - 4; i++) {
      const w = v.slice(i, i + 4);
      if (w[3] - w[0] === 3) {
        if (w[0] !== 1 && w[3] !== 14) oesd = true;
        else gutshot = true;
      } else if (w[3] - w[0] === 4) gutshot = true;
    }
    if (oesd) drawType = 'OESD';
    else if (gutshot) drawType = 'GUTSHOT';
  }

  let tier;
  if (['STRAIGHT_FLUSH','QUADS','FULL_HOUSE','FLUSH','STRAIGHT','TRIPS_OR_SET','TWO_PAIR'].includes(made)) tier = 'monster';
  else if (made === 'PAIR') {
    if (['Overpair','Top pair top kicker','Top pair kicker tốt'].includes(madeDetail)) tier = 'strong';
    else tier = 'medium';
  } else if (hasFlushDraw && drawType === 'OESD') tier = 'strong';
  else if (hasFlushDraw || drawType === 'OESD') tier = 'draw';
  else if (drawType === 'GUTSHOT') tier = 'weak';
  else tier = 'air';

  const texture = detectTexture(board);
  const handLabel = madeLabel(made, madeDetail, drawType, hasFlushDraw);

  return { made, madeDetail, drawType, hasFlushDraw, tier, texture, handLabel };
}

function madeLabel(made, detail, draw, fd) {
  const parts = [];
  switch (made) {
    case 'STRAIGHT_FLUSH': parts.push('Thùng phá sảnh'); break;
    case 'QUADS': parts.push('Tứ quý'); break;
    case 'FULL_HOUSE': parts.push('Cù lũ'); break;
    case 'FLUSH': parts.push('Thùng'); break;
    case 'STRAIGHT': parts.push('Sảnh'); break;
    case 'TRIPS_OR_SET': parts.push(detail); break;
    case 'TWO_PAIR': parts.push(detail); break;
    case 'PAIR': parts.push(detail); break;
    case 'HIGH_CARD': parts.push('Không cặp'); break;
  }
  const draws = [];
  if (fd) draws.push('rút thùng');
  if (draw === 'OESD') draws.push('sảnh mở 2 đầu');
  else if (draw === 'GUTSHOT') draws.push('sảnh trong');
  if (draws.length) parts.push('+ ' + draws.join(' + '));
  return parts.join(' ');
}

const TEXTURE_LABEL = {
  dry: 'khô · rainbow',
  semiwet: 'semi-wet',
  wet: 'ướt · nhiều chất + nối',

// ============ STREET RECOMMENDATION ============

const OPP_ACTIONS = [
  { key: 'check',  label: 'Check / Mình act' },
  { key: 'small',  label: 'Bet ≤⅓' },
  { key: 'medium', label: 'Bet ~½' },
  { key: 'large',  label: 'Bet ≥⅔' },
  { key: 'allin',  label: 'All-in' },
];

function recommendStreet(stage, tier, texture, isAggressor, oppAction) {
  const isDry = texture === 'dry';
  const isRiver = stage === 'river';
  const isTurn = stage === 'turn';

  // River: missed draws become air, weak hands stay weak
  let t = tier;
  if (isRiver && (t === 'draw' || t === 'weak')) t = 'air';

  // === CASE A: Opp checked / we act first ===
  if (oppAction === 'check') {
    if (t === 'monster') return {
      action: 'BET',
      sizing: isRiver ? '75-100% pot' : isTurn ? '66% pot' : '50-66% pot',
      reason: isRiver ? 'River value: bet to, polarized.' : 'Tay to → value bet build pot.',
      color: 'raise'
    };
    if (t === 'strong') return {
      action: 'BET',
      sizing: isRiver ? '50% pot' : '33-50% pot',
      reason: isRiver ? 'River value vừa, target calling station.' : 'Hand mạnh → cbet value/protect.',
      color: 'raise'
    };
    if (t === 'medium') {
      if (isRiver) return { action: 'CHECK', sizing: 'showdown', reason: 'River pair vừa: check, không turn into bluff.', color: 'call' };
      if (isAggressor && isDry) return { action: 'CBET nhỏ', sizing: '33% pot', reason: 'Pair vừa + dry → cbet nhỏ ép fold.', color: 'call' };
      return { action: 'CHECK', sizing: '', reason: 'Pair vừa + wet/OOP → check.', color: 'call' };
    }
    if (t === 'draw') {
      if (isTurn) return { action: 'CHECK / BET 50%', sizing: '', reason: 'Turn draw: equity giảm, semi-bluff cẩn thận.', color: 'call' };
      return { action: 'BET', sizing: '50% pot', reason: 'Big draw → semi-bluff.', color: 'raise' };
    }
    if (t === 'weak') {
      if (isAggressor && isDry) return { action: 'CBET nhỏ', sizing: '25-33% pot', reason: 'Tay yếu + dry → equity denial.', color: 'call' };
      return { action: 'CHECK', sizing: '', reason: 'Tay yếu → check.', color: 'call' };
    }
    // air
    if (isRiver && isAggressor) return { action: 'BLUFF hoặc CHECK', sizing: '66-100% nếu bluff', reason: 'River bluff polarized: chỉ khi story make sense.', color: 'call' };
    if (isAggressor && isDry && !isRiver) return { action: 'CBET bluff', sizing: '33% pot', reason: 'Air + dry → cbet bluff range advantage.', color: 'raise' };
    return { action: 'CHECK', sizing: '', reason: 'Air → check, give up.', color: 'call' };
  }

  // === CASE B: Facing bet ===
  if (t === 'monster') {
    if (oppAction === 'allin') return { action: 'CALL', sizing: '', reason: 'Snap call.', color: 'raise' };
    if (oppAction === 'large') return { action: 'CALL hoặc RAISE', sizing: 'tuỳ board', reason: 'Tay to → call trap hoặc raise.', color: 'raise' };
    return { action: 'RAISE', sizing: '~3x bet', reason: 'Tay to → raise value/protect.', color: 'raise' };
  }
  if (t === 'strong') {
    if (isRiver) {
      if (oppAction === 'small' || oppAction === 'medium') return { action: 'CALL', sizing: '', reason: 'River bluff catch.', color: 'call' };
      if (oppAction === 'large') return { action: 'CALL / FOLD close', sizing: 'lean fold vs tight', reason: 'River bet to: close decision.', color: 'call' };
      return { action: 'FOLD', sizing: '', reason: 'River all-in: strong vẫn fold vs nut range.', color: 'fold' };
    }
    if (oppAction === 'small') return { action: 'CALL / RAISE', sizing: 'raise vs draw board', reason: 'Hand mạnh build pot, charge draw.', color: 'raise' };
    if (oppAction === 'medium') return { action: 'CALL', sizing: '', reason: 'Pot control, để họ bluff tiếp.', color: 'call' };
    if (oppAction === 'large') return { action: 'CALL thận trọng', sizing: 'vs wet board', reason: 'Bet to → cảnh giác nhưng vẫn call.', color: 'call' };
    return { action: 'CALL', sizing: '', reason: 'Overpair/TPTK vs all-in flop/turn → call.', color: 'call' };
  }
  if (t === 'medium') {
    if (isRiver) {
      if (oppAction === 'small') return { action: 'CALL', sizing: '', reason: 'River bluff catch giá rẻ.', color: 'call' };
      return { action: 'FOLD', sizing: '', reason: 'River bet vừa/to → fold pair vừa.', color: 'fold' };
    }
    if (oppAction === 'small') return { action: 'CALL', sizing: '', reason: 'Bluff catch giá rẻ.', color: 'call' };
    if (oppAction === 'medium' && isTurn) return { action: 'FOLD', sizing: 'lean fold turn', reason: 'Turn bet vừa: pair vừa thường lỗ.', color: 'fold' };
    if (oppAction === 'medium') return { action: 'CALL / FOLD', sizing: 'close', reason: 'Close — lean fold multi-way.', color: 'call' };
    return { action: 'FOLD', sizing: '', reason: 'Bet to → pair vừa không đủ.', color: 'fold' };
  }
  if (t === 'draw') {
    if (oppAction === 'small') return { action: 'CALL', sizing: '', reason: 'Pot odds dư cho draw.', color: 'call' };
    if (oppAction === 'medium') return {
      action: isTurn ? 'CALL nếu combo, FOLD nếu đơn' : 'CALL',
      sizing: '',
      reason: isTurn ? 'Turn draw: equity còn ~20%, combo có đủ, đơn không.' : 'Big draw đủ equity vs bet vừa.',
      color: 'call'
    };
    if (oppAction === 'large') return { action: 'CALL nếu combo · FOLD nếu đơn', sizing: 'cần ~30%+', reason: 'Combo (FD+OESD) có đủ; draw đơn không.', color: 'call' };
    return { action: 'FOLD', sizing: '', reason: 'All-in → mất implied, draw không call được.', color: 'fold' };
  }
  // weak or air
  return { action: 'FOLD', sizing: '', reason: 'Tay yếu / air → fold.', color: 'fold' };
}

// ============ STYLES ============

const ACTION_STYLES = {
  RAISE: { bg: 'bg-emerald-600', text: 'text-emerald-50' },
  CALL:  { bg: 'bg-amber-600',   text: 'text-amber-50' },
  FOLD:  { bg: 'bg-zinc-800',    text: 'text-zinc-500' },
};
const FLOP_COLOR_STYLE = {
  raise: { bg: 'bg-emerald-600', text: 'text-emerald-50' },
  call:  { bg: 'bg-amber-600',   text: 'text-amber-50' },
  fold:  { bg: 'bg-zinc-800',    text: 'text-zinc-400' },
};

// ============ SHARED COMPONENTS ============

function Pill({ active, onClick, children, compact }) {
  return (
    <button
      onClick={onClick}
      className={`${compact ? 'px-2.5 py-1 text-xs' : 'px-3 py-1.5 text-sm'} rounded-full font-medium tracking-tight whitespace-nowrap transition ${
        active ? 'bg-zinc-100 text-zinc-950' : 'bg-zinc-900 text-zinc-400 border border-zinc-800'
      }`}
    >{children}</button>
  );
}

function CardSlot({ card, active, onClick, large }) {
  const size = large ? 'h-20 w-14' : 'h-16 w-12';
  return (
    <button
      onClick={onClick}
      className={`relative ${size} rounded-lg flex flex-col items-center justify-center border-2 transition ${
        active ? 'border-zinc-100 bg-zinc-800' :
        card ? 'border-zinc-700 bg-zinc-900' :
        'border-dashed border-zinc-700 bg-zinc-900/40'
      }`}
    >
      {card ? (
        <>
          <div className={`${large ? 'text-2xl' : 'text-xl'} font-bold leading-none text-zinc-100`}>{card.rank}</div>
          <div className={`${large ? 'text-xl' : 'text-lg'} leading-none mt-1 ${SUIT_COLOR[card.suit]}`}>{SUIT_SYMBOL[card.suit]}</div>
        </>
      ) : (
        <div className="text-zinc-700 text-2xl leading-none">+</div>
      )}
    </button>
  );
}

function CardPicker({ usedKeys, onPick }) {
  const [pendingRank, setPendingRank] = useState(null);

  function handleSuit(suit) {
    if (!pendingRank) return;
    if (usedKeys.has(pendingRank + suit)) return;
    onPick({ rank: pendingRank, suit });
    setPendingRank(null);
  }
  const rankFullyUsed = (r) => SUITS.every(s => usedKeys.has(r + s));

  return (
    <div>
      <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">
        {pendingRank
          ? <>Bước 2 · Chọn chất cho <span className="text-zinc-100 font-mono font-bold text-sm">{pendingRank}</span></>
          : <>Bước 1 · Chọn số</>}
      </div>
      <div className="grid grid-cols-7 gap-1.5 mb-2.5">
        {RANKS.map(r => {
          const full = rankFullyUsed(r);
          const active = pendingRank === r;
          return (
            <button
              key={r}
              disabled={full}
              onClick={() => setPendingRank(r)}
              className={`py-3 text-lg font-bold rounded-lg transition ${
                full ? 'bg-zinc-900 text-zinc-700 border border-zinc-900' :
                active ? 'bg-zinc-100 text-zinc-950' :
                'bg-zinc-900 text-zinc-100 border border-zinc-800 active:bg-zinc-800'
              }`}
            >{r}</button>
          );
        })}
      </div>
      <div className="grid grid-cols-4 gap-2">
        {SUITS.map(s => {
          const taken = pendingRank && usedKeys.has(pendingRank + s);
          const disabled = !pendingRank || taken;
          return (
            <button
              key={s}
              disabled={disabled}
              onClick={() => handleSuit(s)}
              className={`py-4 text-3xl rounded-lg transition ${SUIT_COLOR[s]} ${
                disabled ? 'opacity-25 bg-zinc-900 border border-zinc-900' :
                'bg-zinc-900 border-2 border-zinc-700 active:bg-zinc-800'
              }`}
            >{SUIT_SYMBOL[s]}</button>
          );
        })}
      </div>
    </div>
  );
}

// ============ GTO MATRIX (display only, after picking cards) ============

function GTOMatrix({ position, situation, highlightedHand }) {
  const cells = useMemo(() => {
    const arr = [];
    for (let r = 0; r < 13; r++) {
      for (let c = 0; c < 13; c++) {
        const hand = handAt(r, c);
        arr.push({ hand, action: getAction(position, situation, hand) });
      }
    }
    return arr;
  }, [position, situation]);

  const sitLabel = SITUATIONS.find(s => s.key === situation).label;

  return (
    <div>
      <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">
        GTO Map · {position} · {sitLabel}
      </div>
      <div className="grid gap-px bg-zinc-950 rounded-md overflow-hidden border border-zinc-900"
           style={{ gridTemplateColumns: 'repeat(13, minmax(0, 1fr))' }}>
        {cells.map(({ hand, action }) => {
          const s = ACTION_STYLES[action];
          const isHigh = hand === highlightedHand;
          return (
            <div
              key={hand}
              className={`aspect-square flex items-center justify-center font-mono leading-none text-[9px] ${s.bg} ${s.text} ${
                isHigh ? 'ring-2 ring-zinc-100 ring-inset z-10 relative' : ''
              }`}
            >{hand}</div>
          );
        })}
      </div>
      <div className="flex justify-center gap-4 mt-2.5 text-[10px] text-zinc-500">
        <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm bg-emerald-600"/>Raise</div>
        <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm bg-amber-600"/>Call</div>
        <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-sm bg-zinc-800 border border-zinc-700"/>Fold</div>
      </div>
    </div>
  );
}

// ============ PRE-FLOP STAGE ============

function PreflopStage({ position, setPosition, situation, setSituation, holeCards, setHoleCards, onContinue, onReset }) {
  const [activeSlot, setActiveSlot] = useState(0);

  const usedKeys = new Set(holeCards.filter(Boolean).map(cardKey));
  const note = CHARTS[position][situation].note;
  const isBBopen = position === 'BB' && situation === 'open';
  const bothFilled = holeCards[0] && holeCards[1];

  function placeAt(idx, card) {
    const next = [...holeCards];
    next[idx] = card;
    setHoleCards(next);
    const nextEmpty = next.findIndex(c => c === null);
    setActiveSlot(nextEmpty >= 0 ? nextEmpty : null);
  }
  function pickCard(card) {
    let idx = activeSlot;
    if (idx === null) idx = holeCards.findIndex(c => c === null);
    if (idx < 0 || idx === undefined) return;
    placeAt(idx, card);
  }
  function handleSlotClick(idx) {
    if (activeSlot === idx && holeCards[idx]) {
      const next = [...holeCards]; next[idx] = null;
      setHoleCards(next); setActiveSlot(idx);
    } else setActiveSlot(idx);
  }

  const handClass = bothFilled ? cardsToHand(holeCards[0], holeCards[1]) : null;
  const action = handClass && !isBBopen ? getAction(position, situation, handClass) : null;
  const sizing = action ? getSizing(position, situation, action) : '';
  const style = action ? ACTION_STYLES[action] : null;
  const sitLabel = SITUATIONS.find(s => s.key === situation).label;

  return (
    <div className="flex flex-col h-full">
      <div className="px-3 pt-3 pb-1 flex items-center justify-between">
        <div className="text-xs uppercase tracking-[0.2em] text-zinc-500 font-semibold">Poker · GTO</div>
        <div className="text-[10px] text-zinc-600">Pre-flop</div>
      </div>

      <div className="px-3 pt-1">
        <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Vị trí</div>
        <div className="flex gap-1.5 overflow-x-auto pb-1 -mx-3 px-3">
          {POSITIONS.map(p => (
            <Pill key={p} active={position === p} onClick={() => setPosition(p)}>{p}</Pill>
          ))}
        </div>
      </div>

      <div className="px-3 pt-2">
        <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Tình huống</div>
        <div className="flex gap-1.5 overflow-x-auto pb-1 -mx-3 px-3">
          {SITUATIONS.map(s => (
            <Pill key={s.key} active={situation === s.key} onClick={() => setSituation(s.key)} compact>{s.label}</Pill>
          ))}
        </div>
      </div>

      {note && (
        <div className="mx-3 mt-3 p-2.5 rounded-lg bg-zinc-900 border border-zinc-800 text-xs text-zinc-400 leading-relaxed">{note}</div>
      )}

      <div className="flex-1 overflow-y-auto">
        <div className="px-3 pt-3">
          <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Tay bạn</div>
          <div className="flex items-center gap-3">
            <div className="flex gap-2">
              <CardSlot card={holeCards[0]} active={activeSlot === 0} onClick={() => handleSlotClick(0)} large />
              <CardSlot card={holeCards[1]} active={activeSlot === 1} onClick={() => handleSlotClick(1)} large />
            </div>
            {handClass && (
              <div className="text-zinc-500 text-xs">
                Class: <span className="text-zinc-100 font-mono font-bold text-sm">{handClass}</span>
              </div>
            )}
          </div>
        </div>

        {/* Picker if cards not both picked, else GTO matrix */}
        <div className="px-3 pt-3 pb-3">
          {bothFilled && !isBBopen ? (
            <GTOMatrix position={position} situation={situation} highlightedHand={handClass} />
          ) : !bothFilled ? (
            <CardPicker usedKeys={usedKeys} onPick={pickCard} />
          ) : null}
        </div>
      </div>

      <div className="p-3 pt-2 space-y-2 border-t border-zinc-900">
        {isBBopen ? (
          <button onClick={onReset} className="w-full py-2.5 text-sm font-semibold bg-zinc-100 text-zinc-950 rounded-full">
            ↻ Tay mới
          </button>
        ) : action ? (
          <>
            <div className={`rounded-2xl p-4 ${style.bg} ${style.text}`}>
              <div className="text-[10px] uppercase tracking-widest opacity-70 mb-0.5">
                {handClass} · {position} · {sitLabel}
              </div>
              <div className="flex items-baseline justify-between gap-3">
                <div className="text-3xl font-bold tracking-tight">{action}</div>
                {sizing && <div className="text-sm font-medium opacity-90">{sizing}</div>}
              </div>
            </div>
            {action === 'FOLD' ? (
              <button onClick={onReset} className="w-full py-2.5 text-xs text-zinc-500 border border-zinc-800 rounded-full">
                ↻ Chơi tay mới
              </button>
            ) : (
              <button onClick={onContinue} className="w-full py-2.5 text-sm font-semibold bg-zinc-100 text-zinc-950 rounded-full">
                Đi tiếp đến Flop →
              </button>
            )}
          </>
        ) : (
          <div className="rounded-2xl p-3 bg-zinc-900 border border-zinc-800 text-zinc-500 text-sm">
            Chạm 2 lá bài của bạn để xem hành động GTO.
          </div>
        )}
      </div>
    </div>
  );
}

// ============ BOARD STAGE (flop / turn / river) ============

const STAGE_META = {
  flop:  { boardCount: 3, label: 'Flop',  prev: 'Pre-flop', next: 'Đi tiếp đến Turn →',  newSlot: 2 },
  turn:  { boardCount: 4, label: 'Turn',  prev: 'Flop',     next: 'Đi tiếp đến River →', newSlot: 5 },
  river: { boardCount: 5, label: 'River', prev: 'Turn',     next: null,                  newSlot: 6 },
};

function BoardStage({ stage, ctx, holeCards, setHoleCards, boardCards, setBoardCards, onBack, onContinue, onReset }) {
  const meta = STAGE_META[stage];
  const totalSlots = 2 + meta.boardCount;

  const initialActive = (() => {
    for (let i = 2; i < totalSlots; i++) {
      if (boardCards[i - 2] === null) return i;
    }
    return null;
  })();

  const [activeSlot, setActiveSlot] = useState(initialActive);
  const [oppAction, setOppAction] = useState('check');

  const allSlotsArr = [...holeCards, ...boardCards];
  const relevant = allSlotsArr.slice(0, totalSlots);
  const allFilled = relevant.every(Boolean);
  const usedKeys = new Set(relevant.filter(Boolean).map(cardKey));

  function placeAt(idx, card) {
    const next = [...allSlotsArr];
    next[idx] = card;
    setHoleCards(next.slice(0, 2));
    setBoardCards(next.slice(2));
    let n = null;
    for (let i = idx + 1; i < totalSlots; i++) if (next[i] === null) { n = i; break; }
    if (n === null) for (let i = 0; i < totalSlots; i++) if (next[i] === null) { n = i; break; }
    setActiveSlot(n);
  }
  function pickCard(card) {
    let idx = activeSlot;
    if (idx === null || idx === undefined || idx >= totalSlots) {
      idx = relevant.findIndex(c => c === null);
      if (idx < 0) return;
    }
    placeAt(idx, card);
  }
  function handleSlotClick(idx) {
    if (activeSlot === idx && allSlotsArr[idx]) {
      const next = [...allSlotsArr]; next[idx] = null;
      setHoleCards(next.slice(0, 2));
      setBoardCards(next.slice(2));
      setActiveSlot(idx);
    } else setActiveSlot(idx);
  }

  const board = boardCards.slice(0, meta.boardCount);
  const analysis = allFilled ? classifyHand(holeCards, board, stage) : null;
  const action = analysis ? recommendStreet(stage, analysis.tier, analysis.texture, ctx.isAggressor, oppAction) : null;
  const actStyle = action ? FLOP_COLOR_STYLE[action.color] : null;

  const canContinue = meta.next && action && action.color !== 'fold' && allFilled;

  return (
    <div className="flex flex-col h-full">
      <div className="px-3 pt-3 pb-2 flex items-center justify-between border-b border-zinc-900">
        <button onClick={onBack} className="text-zinc-400 text-sm flex items-center gap-1">
          <span>←</span><span>{meta.prev}</span>
        </button>
        <div className="text-[11px] text-zinc-400">
          <span className="font-bold text-zinc-100">{ctx.handClass}</span>
          <span className="text-zinc-600"> · </span>{ctx.position}
          <span className="text-zinc-600"> · </span>
          {ctx.isAggressor
            ? <span className="text-emerald-400 font-semibold">Agg</span>
            : <span className="text-amber-400 font-semibold">Caller</span>}
          <span className="text-zinc-600"> · </span>
          <span className="font-bold text-zinc-100">{meta.label}</span>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto">
        {/* Slot row */}
        <div className="px-3 pt-3">
          <div className="flex items-end gap-2 flex-wrap">
            <div>
              <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Tay</div>
              <div className="flex gap-1.5">
                <CardSlot card={holeCards[0]} active={activeSlot === 0} onClick={() => handleSlotClick(0)} />
                <CardSlot card={holeCards[1]} active={activeSlot === 1} onClick={() => handleSlotClick(1)} />
              </div>
            </div>
            <div>
              <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Flop</div>
              <div className="flex gap-1.5">
                <CardSlot card={boardCards[0]} active={activeSlot === 2} onClick={() => handleSlotClick(2)} />
                <CardSlot card={boardCards[1]} active={activeSlot === 3} onClick={() => handleSlotClick(3)} />
                <CardSlot card={boardCards[2]} active={activeSlot === 4} onClick={() => handleSlotClick(4)} />
              </div>
            </div>
            {meta.boardCount >= 4 && (
              <div>
                <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Turn</div>
                <CardSlot card={boardCards[3]} active={activeSlot === 5} onClick={() => handleSlotClick(5)} />
              </div>
            )}
            {meta.boardCount >= 5 && (
              <div>
                <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">River</div>
                <CardSlot card={boardCards[4]} active={activeSlot === 6} onClick={() => handleSlotClick(6)} />
              </div>
            )}
          </div>
        </div>

        {!allFilled && (
          <div className="px-3 pt-3">
            <CardPicker usedKeys={usedKeys} onPick={pickCard} />
          </div>
        )}

        {allFilled && (
          <div className="px-3 pt-3">
            <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1.5">Đối thủ làm gì?</div>
            <div className="flex gap-1.5 overflow-x-auto pb-1 -mx-3 px-3">
              {OPP_ACTIONS.map(o => (
                <Pill key={o.key} active={oppAction === o.key} onClick={() => setOppAction(o.key)} compact>{o.label}</Pill>
              ))}
            </div>
          </div>
        )}

        {analysis && (
          <div className="px-3 pt-3">
            <div className="rounded-xl bg-zinc-900 border border-zinc-800 p-3">
              <div className="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Phân tích · {meta.label}</div>
              <div className="text-sm font-semibold text-zinc-100">{analysis.handLabel}</div>
              <div className="text-xs text-zinc-500 mt-1">Board: {TEXTURE_LABEL[analysis.texture]}</div>
            </div>
          </div>
        )}

        {action && (
          <div className="px-3 pt-3 pb-3">
            <div className={`rounded-2xl p-4 ${actStyle.bg} ${actStyle.text}`}>
              <div className="text-[10px] uppercase tracking-widest opacity-70 mb-0.5">Hành động · {meta.label}</div>
              <div className="flex items-baseline justify-between gap-3 mb-1.5">
                <div className="text-2xl font-bold tracking-tight">{action.action}</div>
                {action.sizing && <div className="text-xs font-medium opacity-90 text-right">{action.sizing}</div>}
              </div>
              <div className="text-xs opacity-85 leading-relaxed">{action.reason}</div>
            </div>
          </div>
        )}
      </div>

      <div className="px-3 py-2 border-t border-zinc-900 space-y-1.5">
        {canContinue && (
          <button onClick={onContinue} className="w-full py-2.5 text-sm font-semibold bg-zinc-100 text-zinc-950 rounded-full">
            {meta.next}
          </button>
        )}
        <button onClick={onReset} className="w-full py-2 text-xs text-zinc-500 border border-zinc-800 rounded-full">
          ↻ Tay mới
        </button>
      </div>
    </div>
  );
}

// ============ APP ============

function App() {
  const [stage, setStage] = useState('preflop');
  const [position, setPosition] = useState('BTN');
  const [situation, setSituation] = useState('open');
  const [holeCards, setHoleCards] = useState([null, null]);
  const [boardCards, setBoardCards] = useState([null, null, null, null, null]);

  const handClass = holeCards[0] && holeCards[1] ? cardsToHand(holeCards[0], holeCards[1]) : null;
  const preAction = handClass ? getAction(position, situation, handClass) : null;
  const isAggressor = preAction === 'RAISE';

  function newHand() {
    setHoleCards([null, null]);
    setBoardCards([null, null, null, null, null]);
    setStage('preflop');
  }

  function goToFlop() {
    setBoardCards([null, null, null, null, null]);
    setStage('flop');
  }
  function advanceStage() {
    if (stage === 'flop') setStage('turn');
    else if (stage === 'turn') setStage('river');
  }
  function backStage() {
    if (stage === 'flop') setStage('preflop');
    else if (stage === 'turn') setStage('flop');
    else if (stage === 'river') setStage('turn');
  }

  const ctx = { handClass, position, situation, isAggressor, preAction };

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-100 flex flex-col"
         style={{ fontFamily: 'ui-sans-serif, system-ui, -apple-system, sans-serif' }}>
      {stage === 'preflop' ? (
        <PreflopStage
          position={position} setPosition={setPosition}
          situation={situation} setSituation={setSituation}
          holeCards={holeCards} setHoleCards={setHoleCards}
          onContinue={goToFlop}
          onReset={newHand}
        />
      ) : (
        <BoardStage
          key={stage}
          stage={stage}
          ctx={ctx}
          holeCards={holeCards} setHoleCards={setHoleCards}
          boardCards={boardCards} setBoardCards={setBoardCards}
          onBack={backStage}
          onContinue={advanceStage}
          onReset={newHand}
        />
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
